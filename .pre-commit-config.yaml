repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [src/, --config-file=pyproject.toml]
        pass_filenames: false
        # mypy checks src/ as a whole; ignore_missing_imports is set in pyproject.toml

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
        args: [--args=-recursive]
      - id: terraform_validate
        # --init-args skips the GCS backend so no GCP creds are needed locally.
        args: [--args=-no-color, --init-args=-backend=false]

  - repo: https://github.com/google/osv-scanner
    rev: v2.0.2
    hooks:
      - id: osv-scanner
        args: [--lockfile=uv.lock]
